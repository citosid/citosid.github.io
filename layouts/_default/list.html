{{ define "main" }}
<div class="post-list">
    {{ range .Pages }}
    <div class="post-row">
        <div class="post-info">
            <a href="{{ .RelPermalink }}" class="post-title">{{ .Title }}</a>
            <span class="post-meta">
                {{ .Date.Format "Jan 2, 2006" }}
                {{ with .Params.tags }}
                • {{ delimit . ", " }}
                {{ end }}
            </span>
        </div>
    </div>
    {{ end }}
</div>
{{ end }}
