{{ define "main" }}
<article class="post-content">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
        📆 {{ .Date.Format "January 2, 2006" }} 📖 {{ .ReadingTime }} min
        {{ with .Params.tags }}
        • Tags: {{ delimit . ", " }}
        {{ end }}
    </div>
    {{ .Content }}
</article>
{{ end }}
