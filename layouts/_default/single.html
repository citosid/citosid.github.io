{{ define "main" }}
<article>
    <div class="post-header">
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
            {{ .Date.Format "January 2, 2006" }} · {{ .ReadingTime }} min read{{ with .Params.tags }} · {{ delimit . ", " }}{{ end }}
        </div>
    </div>
    {{ .Content }}
</article>
{{ end }}
