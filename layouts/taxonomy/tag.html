{{ define "main" }}
<h1>Tag: {{ .Title }}</h1>
<div class="post-list">
    {{ range .Pages }}
    <div class="post-row">
        <div class="post-info">
            <a href="{{ .RelPermalink }}" class="post-title-link">{{ .Title }}</a>
            <span class="post-meta">{{ .Date.Format "Jan 2, 2006" }}</span>
        </div>
    </div>
    {{ end }}
</div>
{{ end }}
